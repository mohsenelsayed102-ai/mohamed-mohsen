<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>تسجيل البلاغ الشهري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        .form-container { max-width: 600px; background: #fff; margin: 40px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #2c3e50; margin-top: 0; border-bottom: 2px solid #eef6ff; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568; }
        select, input[type="number"], textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        .btn-submit { background: #2c3e50; color: #fff; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: 'Cairo', sans-serif; width: 100%; font-size: 16px; }
        .btn-submit:hover { background: #1a252f; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #2c3e50; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="form-container">
    <a href="index.html" class="back-link">⬅️ العودة للرئيسية</a>
    <h2>📊 تقرير وإحصائيات البلاغ الشهري</h2>
    <form>
        <div class="form-group">
            <label>اختر الشهر المستهدف:</label>
            <select required>
                <option value="">-- اختر الشهر --</option>
                <option>يناير</option> <option>فبراير</option> <option>مارس</option>
                <option>أبريل</option> <option>مايو</option> <option>يونيو</option>
                <option>يوليو</option> <option>أغسطس</option> <option>سبتمبر</option>
                <option>أكتوبر</option> <option>نوفمبر</option> <option>ديسمبر</option>
            </select>
        </div>
        <div class="form-group">
            <label>إجمالي قرارات ونفقة الدولة المنجزة:</label>
            <input type="number" placeholder="0">
        </div>
        <div class="form-group">
            <label>أعطال الأجهزة الطبية المعطلة ومتابعة الصيانة:</label>
            <textarea rows="3" placeholder="اكتب حالة الأجهزة والصيانة هنا..."></textarea>
        </div>
        <div class="form-group">
            <label>التوصيات الختامية لرفع الكفاءة الشهر القادم:</label>
            <textarea rows="4" placeholder="توصيات عم العالم لتطوير العمل..."></textarea>
        </div>
        <button type="submit" class="btn-submit">اعتماد وإرسال التقرير الشهري</button>
    </form>
</div>

</body>
</html>
